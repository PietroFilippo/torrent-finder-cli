name: Release

# Push a tag like v0.1.3 -> build + publish to PyPI.
# Run manually (Actions tab) -> build + publish to TestPyPI, to rehearse first.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # setuptools-scm needs full history + tags
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  testpypi:
    # Manual runs only — rehearse the publish without touching real PyPI.
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write           # Trusted Publishing (OIDC) — no API token needed
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    # Tag pushes only — the real release.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  binaries:
    # Tag pushes only — build a standalone executable per OS (no Python needed)
    # and attach it to the GitHub Release. The collect-all / copy-metadata flags
    # are what make subliminal's entry-point subtitle providers work when frozen.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: write          # upload assets to the Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: torrent-finder-linux
          - os: windows-latest
            asset: torrent-finder-windows.exe
          - os: macos-latest
            asset: torrent-finder-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0        # setuptools-scm needs full history + tags
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install package + PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller
      - name: Build standalone binary
        run: >
          pyinstaller --onefile --name torrent-finder
          --collect-all subliminal --collect-all babelfish
          --collect-all guessit --collect-all dogpile.cache
          --copy-metadata torrent-finder-cli --copy-metadata readchar
          --copy-metadata rich --copy-metadata requests --copy-metadata subliminal
          torrent_finder/__main__.py
      - name: Name the asset per OS
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/torrent-finder.exe "out/${{ matrix.asset }}"
          else
            mv dist/torrent-finder "out/${{ matrix.asset }}"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
